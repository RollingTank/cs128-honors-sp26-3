<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileHunt - {% block title %}{% endblock %}</title>
    <style>
        body {
            margin: 0;
            background: #fff;
            color: #111;
            font-family: "Times New Roman", Times, serif;
            line-height: 1.4;
        }
        a,
        a:visited {
            color: #0000ee;
            text-decoration: underline;
        }
        a:hover,
        a:focus {
            color: #551a8b;
        }
        .page {
            max-width: 980px;
            margin: 0;
            padding: 12px 18px 28px 14px;
        }
        .site-title {
            margin: 0 0 2px 0;
            font-size: 2.15rem;
        }
        .tagline {
            margin: 0 0 9px 3px;
        }
        .nav-line {
            margin: 7px 0 11px 0;
        }
        .nav-line a {
            margin-right: 18px;
        }
        hr {
            border: 0;
            border-top: 1px solid #999;
            margin: 11px 0 17px 0;
        }
        .box {
            border: 1px solid #b8b8b8;
            padding: 9px 11px 12px 9px;
            margin: 9px 0 17px 0;
            background: #fff;
        }
        .row {
            margin: 4px 0 7px 0;
        }
        .muted {
            color: #444;
        }
        .difficulty {
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .alert {
            border: 1px dashed #888;
            padding: 8px 10px;
            margin: 10px 0 14px 3px;
        }
        .alert-success {
            color: #0d640d;
        }
        .alert-error {
            color: #a20000;
        }
        .alert-info {
            color: #163b9b;
        }
        label {
            display: block;
            margin: 10px 0 3px 0;
        }
        input,
        select,
        textarea,
        button {
            font: inherit;
        }
        input,
        select,
        textarea {
            width: 100%;
            max-width: 100%;
            padding: 4px;
            border: 1px solid #8a8a8a;
            background: #fff;
            color: #111;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        button {
            margin-top: 9px;
            padding: 4px 10px;
            border: 1px solid #8d8d8d;
            background: #d8d8d8;
            color: #000;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border: 1px solid #9a9a9a;
        }
        th {
            background: #ececec;
        }
        ul {
            padding-left: 20px;
        }
        .crooked {
            margin-left: 17px;
        }
        .offset {
            margin-left: 7px;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="site-title">FileHunt</div>
        <p class="tagline">a digital scavenger hunt on the web with no security lol</p>
        <div class="nav-line">
            <a href="/">home</a>
            <a href="/challenges">challenges</a>
            <a href="/create">create</a>
            <a href="/scoreboard">scoreboard</a>
        </div>
        <hr>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
